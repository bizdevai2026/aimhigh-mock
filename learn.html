<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Learn &middot; GradeBlaze</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/logo.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f1729" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GradeBlaze" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap">
  <!-- Theme bootstrap. Runs before mock.css evaluates so the correct theme is on <html> at first paint (no FOUC). -->
  <script src="boot/theme.js"></script>
  <link rel="stylesheet" href="mock.css?v=20260603" />
</head>
<body class="mock-page mode-learn">
  <header class="mock-header">
    <div class="mock-header-inner">
      <a class="gb-brand" href="index.html" aria-label="GradeBlaze home">
        <img class="gb-logo-mark" src="assets/logo.svg" alt="" aria-hidden="true" />
        <span class="gb-wordmark gb-wordmark-sm">
          <span class="gb-grade">Grade</span><span class="gb-blaze">Blaze</span>
        </span>
      </a>
    </div>
  </header>

  <main class="mock-main" id="learnRoot">
    <section class="mock-stub-card">
      <p class="mock-coach-empty">Loading&hellip;</p>
    </section>
  </main>

  <!-- Shared pre-import error catcher + loading guard. See boot/*.js.
       Plain scripts (no module loader, no ?v=) so a stuck module cache
       cannot disable the safety net. Must come BEFORE the module. -->
  <script src="boot/error-catcher.js"></script>
  <script src="boot/loading-guard.js"></script>

  <script type="module" src="learn.js?v=20260603"></script>
</body>
</html>
