<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Coach &middot; GradeBlaze</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/logo.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f1729" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GradeBlaze" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap">
  <!-- Theme bootstrap. Runs before mock.css evaluates so the correct theme is on <html> at first paint (no FOUC). -->
  <script src="boot/theme.js"></script>
  <link rel="stylesheet" href="mock.css?v=20260608" />
</head>
<body class="mock-page mode-coach">
  <header class="mock-header">
    <div class="mock-header-inner">
      <a class="gb-brand" href="index.html" aria-label="GradeBlaze home">
        <img class="gb-logo-mark" src="assets/logo.svg" alt="" aria-hidden="true" />
        <span class="gb-wordmark gb-wordmark-sm">
          <span class="gb-grade">Grade</span><span class="gb-blaze">Blaze</span>
        </span>
      </a>
    </div>
  </header>

  <main class="mock-main" id="coachRoot">
    <section class="mock-stub-hero">
      <span class="mock-stub-tag">For parents</span>
      <h1 class="mock-stub-title">COACH</h1>
      <p class="mock-stub-quote">"What to drill next."</p>
      <p class="mock-stub-name" id="dashGreeting"></p>
    </section>

    <section class="mock-coach-block" id="coachLadder"></section>

    <section class="mock-coach-block" id="coachToday">
      <h2>Today's session</h2>
      <p class="mock-coach-empty" id="coachTodayEmpty">No warm-up done yet today.</p>
    </section>

    <section class="mock-coach-block" id="coachWeak">
      <h2>Weak topics &mdash; last 7 days</h2>
      <p class="mock-coach-empty" id="coachWeakEmpty">Nothing flagged yet. Run a few warm-ups first.</p>
    </section>

    <section class="mock-coach-block" id="coachHistory">
      <h2>Last 7 days</h2>
      <p class="mock-coach-empty" id="coachHistoryEmpty">No sessions logged yet.</p>
    </section>
  </main>

  <script src="boot/error-catcher.js"></script>
  <script src="boot/loading-guard.js"></script>
  <script type="module" src="dashboard.js?v=20260608"></script>
</body>
</html>
